<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring My Friend</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px;}
        input, button { padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; }
        button { cursor: pointer; font-weight: bold; }
        #regBtn { background-color: #4CAF50; color: white; border: none; }
        #ringBtn { background-color: #ff4757; color: white; border: none; }
        #status { color: #2ed573; font-size: 0.9em; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ring App</h2>
        
        <input type="text" id="username" placeholder="Your Name (e.g. Rahul)">
        <button id="regBtn">Enable My Phone to Ring</button>
        <p id="status"></p>

        <hr>

        <h3>Who to ring?</h3>
        <input type="text" id="targetUser" placeholder="Friend's Name (e.g. Priya)">
        <button id="ringBtn">RING THEM!</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
